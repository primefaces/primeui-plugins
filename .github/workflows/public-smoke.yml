name: Public Client Smoke

on:
  workflow_call:
    inputs:
      source-sha:
        required: true
        type: string

permissions:
  contents: read

jobs:
  clients:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install current client CLIs
        run: npm install --global @anthropic-ai/claude-code @google/gemini-cli @openai/codex
      - run: npm run validate:claude -- --source local
      - run: npm run validate:codex -- --source local
      - run: npm run validate:gemini -- --source export
      - run: npm run validate:cursor -- --source payload
      - run: npm run check:clean
